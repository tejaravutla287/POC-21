apiVersion: apps/v1
kind: Deployment
metadata:
  name: secured-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secured-app
  template:
    metadata:
      labels:
        app: secured-app
    spec:
      containers:
      - name: secured-app
        image: YOUR_DOCKERHUB_USERNAME/secured-app:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
          limits:
            memory: "300Mi"
            cpu: "300m"
